function startTest() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('test').style.display = 'block';
    currentQuestion = 0;
    loadQuestion();
}

function loadQuestion() {
    const q = questions[currentQuestion];
    document.getElementById('questionNum').innerHTML = `第 ${currentQuestion+1}/36 题`;
    document.getElementById('questionText').innerHTML = q.q + (q.multi ? ' <span class="multi-label">（多选）</span>' : '');
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = '';
    q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.textContent = opt;
        if (q.multi) {
            div.onclick = () => toggleSelect(i, div);
        } else {
            div.onclick = () => singleSelect(i, div);
        }
        optsDiv.appendChild(div);
    });
    updateProgress();
}

function singleSelect(index, el) {
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    answers[currentQuestion] = [index];
}

function toggleSelect(index, el) {
    el.classList.toggle('selected');
    if (!answers[currentQuestion]) answers[currentQuestion] = [];
    if (answers[currentQuestion].includes(index)) {
        answers[currentQuestion] = answers[currentQuestion].filter(i => i !== index);
    } else {
        answers[currentQuestion].push(index);
    }
}

function updateProgress() {
    const percent = Math.round(((currentQuestion + 1) / 36) * 100);
    document.getElementById('progressBar').style.width = percent + '%';
}

function nextQuestion() {
    if (currentQuestion < 35) {
        currentQuestion++;
        loadQuestion();
    } else {
        showResult();
    }
}

function prevQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
    }
}

function calculateScores() {
    let scores = new Array(8).fill(0);
    answers.forEach((ans, i) => {
        if (ans) ans.forEach(choice => { scores[choice % 8] += 2.5; });
    });
    const total = scores.reduce((a,b)=>a+b,0) || 1;
    return scores.map(s => Math.round((s / total) * 100));
}

function showResult() {
    document.getElementById('test').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    const percentages = calculateScores();
    const maxIndex = percentages.indexOf(Math.max(...percentages));
    const mainType = types[maxIndex];
    let html = `<h2 class="result-title">${mainType}</h2>`;
    html += reports[mainType] || "<p>报告生成中...</p>";
    document.getElementById('resultContent').innerHTML = html;
}

function restartTest() {
    location.reload();
}
</script>
